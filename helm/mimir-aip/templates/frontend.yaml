{{- if .Values.frontend.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mimir-aip.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mimir-aip.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "mimir-aip.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "mimir-aip.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.image.registry }}/frontend:{{ include "mimir-aip.imageTag" . }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.frontend.port }}
          protocol: TCP
        env:
        - name: PORT
          value: {{ .Values.frontend.port | toString | quote }}
        - name: API_URL
          value: "http://{{ include "mimir-aip.fullname" . }}-orchestrator:{{ .Values.orchestrator.port }}"
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mimir-aip.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mimir-aip.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.serviceType }}
  selector:
    {{- include "mimir-aip.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
{{- end }}
