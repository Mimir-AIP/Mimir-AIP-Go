components:
    schemas:
        Action:
            properties:
                condition:
                    $ref: '#/components/schemas/ActionCondition'
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Description
                    type: string
                digital_twin_id:
                    description: Owning digital twin ID
                    type: string
                enabled:
                    description: Whether the action is active
                    type: boolean
                id:
                    description: Action ID (UUID)
                    type: string
                last_triggered:
                    description: ISO-8601 timestamp of the most recent trigger
                    type: string
                name:
                    description: Action name
                    type: string
                trigger:
                    $ref: '#/components/schemas/ActionTrigger'
                trigger_count:
                    description: Number of times the action has fired
                    type: integer
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        ActionCondition:
            properties:
                attribute:
                    description: Optional entity attribute for attribute-based conditions
                    type: string
                entity_type:
                    description: Optional entity type filter
                    type: string
                model_id:
                    description: Optional model ID for prediction-based conditions
                    type: string
                operator:
                    description: gt | gte | lt | lte | eq | ne
                    type: string
                threshold:
                    description: Comparison threshold value
            required:
                - operator
                - threshold
            type: object
        ActionCreateRequest:
            properties:
                condition:
                    $ref: '#/components/schemas/ActionCondition'
                description:
                    description: Description
                    type: string
                enabled:
                    description: Whether the action starts enabled
                    type: boolean
                name:
                    description: Action name
                    type: string
                trigger:
                    $ref: '#/components/schemas/ActionTrigger'
            required:
                - name
                - condition
                - trigger
            type: object
        ActionTrigger:
            properties:
                parameters:
                    additionalProperties: true
                    type: object
                pipeline_id:
                    description: Pipeline ID to execute when the action fires
                    type: string
            required:
                - pipeline_id
            type: object
        AlertEvent:
            properties:
                automation_id:
                    description: Automation that emitted the alert
                    type: string
                category:
                    description: Alert category
                    type: string
                created_at:
                    description: Alert event timestamp
                    type: string
                digital_twin_id:
                    description: Owning digital twin ID
                    type: string
                entity_refs:
                    items:
                        type: string
                    type: array
                id:
                    description: Alert event ID (UUID)
                    type: string
                message:
                    description: Alert message
                    type: string
                ontology_context:
                    additionalProperties: true
                    type: object
                processing_run_id:
                    description: Processing run that emitted the alert
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                severity:
                    description: low | medium | high | critical
                    type: string
                source_insight_id:
                    description: Optional source insight ID
                    type: string
                title:
                    description: Alert title
                    type: string
                triggered_export_pipeline_id:
                    description: Export pipeline triggered by this alert, if any
                    type: string
                triggered_work_task_id:
                    description: Triggered export work task ID, if any
                    type: string
            type: object
        AnalysisRun:
            properties:
                algorithm_version:
                    description: Detector/resolver algorithm version
                    type: string
                completed_at:
                    description: Run completion timestamp
                    type: string
                coverage:
                    additionalProperties: true
                    type: object
                created_at:
                    description: Run creation timestamp
                    type: string
                error:
                    description: Failure message, when status=failed
                    type: string
                id:
                    description: Analysis run ID (UUID)
                    type: string
                kind:
                    description: resolver | insights
                    type: string
                metrics:
                    additionalProperties: true
                    type: object
                policy_version:
                    description: Resolver policy version string
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                source_ids:
                    items:
                        type: string
                    type: array
                status:
                    description: completed | failed
                    type: string
            type: object
        Automation:
            properties:
                action_config:
                    additionalProperties: true
                    type: object
                action_type:
                    description: process_twin | trigger_export_pipeline
                    type: string
                condition_config:
                    additionalProperties: true
                    type: object
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Description
                    type: string
                enabled:
                    description: Whether the automation is active
                    type: boolean
                id:
                    description: Automation ID (UUID)
                    type: string
                name:
                    description: Automation name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                target_id:
                    description: Target resource ID
                    type: string
                target_type:
                    description: pipeline | digital_twin
                    type: string
                trigger_config:
                    additionalProperties: true
                    type: object
                trigger_type:
                    description: pipeline_completed | manual
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        AutomationCreateRequest:
            properties:
                action_config:
                    additionalProperties: true
                    type: object
                action_type:
                    description: process_twin | trigger_export_pipeline
                    type: string
                condition_config:
                    additionalProperties: true
                    type: object
                description:
                    description: Description
                    type: string
                enabled:
                    description: Whether the automation starts enabled
                    type: boolean
                name:
                    description: Automation name
                    type: string
                target_id:
                    description: Target resource ID (overridden for twin-scoped routes)
                    type: string
                target_type:
                    description: pipeline | digital_twin (overridden for twin-scoped routes)
                    type: string
                trigger_config:
                    additionalProperties: true
                    type: object
                trigger_type:
                    description: pipeline_completed | manual
                    type: string
            required:
                - name
            type: object
        AutomationUpdateRequest:
            properties:
                action_config:
                    additionalProperties: true
                    type: object
                action_type:
                    description: process_twin | trigger_export_pipeline
                    type: string
                condition_config:
                    additionalProperties: true
                    type: object
                description:
                    description: Description
                    type: string
                enabled:
                    description: Whether the automation is active
                    type: boolean
                name:
                    description: Automation name
                    type: string
                trigger_config:
                    additionalProperties: true
                    type: object
                trigger_type:
                    description: pipeline_completed | manual
                    type: string
            type: object
        CIR:
            description: Common Internal Representation — the normalised record format used across all storage backends.
            properties:
                data:
                    additionalProperties: true
                    description: Record payload
                    type: object
                id:
                    description: CIR record ID
                    type: string
                metadata:
                    additionalProperties: true
                    description: Record metadata
                    type: object
                source:
                    additionalProperties: true
                    description: Provenance information
                    type: object
            type: object
        CIRCondition:
            properties:
                attribute:
                    description: Attribute name
                    type: string
                operator:
                    description: eq | neq | gt | gte | lt | lte | in | like
                    type: string
                value:
                    description: Filter value
            required:
                - attribute
                - operator
                - value
            type: object
        CIRQuery:
            properties:
                entity_type:
                    description: Filter by entity type
                    type: string
                filters:
                    items:
                        $ref: '#/components/schemas/CIRCondition'
                    type: array
                limit:
                    description: Maximum results
                    type: integer
                offset:
                    description: Pagination offset
                    type: integer
                order_by:
                    items:
                        $ref: '#/components/schemas/OrderByClause'
                    type: array
            type: object
        ConnectorField:
            properties:
                default:
                    description: Optional default value
                description:
                    description: Field description
                    type: string
                label:
                    description: Human-readable field label
                    type: string
                name:
                    description: Field key
                    type: string
                options:
                    items:
                        $ref: '#/components/schemas/ConnectorFieldOption'
                    type: array
                required:
                    description: Whether the field is required
                    type: boolean
                type:
                    description: text | number | boolean | select
                    type: string
            required:
                - name
                - label
                - type
                - required
            type: object
        ConnectorFieldOption:
            properties:
                label:
                    description: Display label
                    type: string
                value:
                    description: Option value
                    type: string
            required:
                - value
                - label
            type: object
        ConnectorScheduleRequest:
            properties:
                cron_schedule:
                    description: Cron expression for recurring runs
                    type: string
                enabled:
                    description: Whether the schedule starts enabled
                    type: boolean
                name:
                    description: Optional schedule name override
                    type: string
            required:
                - cron_schedule
            type: object
        ConnectorSetupRequest:
            properties:
                description:
                    description: Optional pipeline description
                    type: string
                kind:
                    description: Connector template kind
                    type: string
                name:
                    description: Pipeline name to create
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                schedule:
                    $ref: '#/components/schemas/ConnectorScheduleRequest'
                source_config:
                    additionalProperties: true
                    type: object
                storage_id:
                    description: Destination storage configuration ID
                    type: string
            required:
                - project_id
                - kind
                - name
                - storage_id
                - source_config
            type: object
        ConnectorSetupResponse:
            properties:
                pipeline:
                    $ref: '#/components/schemas/Pipeline'
                schedule:
                    $ref: '#/components/schemas/Schedule'
                template:
                    $ref: '#/components/schemas/ConnectorTemplate'
            required:
                - template
                - pipeline
            type: object
        ConnectorTemplate:
            properties:
                category:
                    description: database | http | feed | file
                    type: string
                description:
                    description: What this connector does
                    type: string
                fields:
                    items:
                        $ref: '#/components/schemas/ConnectorField'
                    type: array
                kind:
                    description: Template identifier
                    type: string
                label:
                    description: Display name
                    type: string
                pipeline_type:
                    description: Pipeline type created by this connector
                    type: string
                supports_schedule:
                    description: Whether recurring execution is supported
                    type: boolean
            required:
                - kind
                - label
                - description
                - category
                - pipeline_type
                - supports_schedule
                - fields
            type: object
        DigitalTwin:
            properties:
                config:
                    $ref: '#/components/schemas/DigitalTwinConfig'
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Description
                    type: string
                id:
                    description: Digital twin ID (UUID)
                    type: string
                last_sync_at:
                    description: ISO-8601 timestamp of the most recent completed sync
                    type: string
                metadata:
                    additionalProperties: true
                    type: object
                name:
                    description: Digital twin name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                status:
                    description: active | syncing | error
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        DigitalTwinConfig:
            properties:
                custom_settings:
                    additionalProperties:
                        type: string
                    type: object
                enable_predictions:
                    description: Whether prediction endpoints are enabled for this twin
                    type: boolean
                prediction_cache_ttl:
                    description: Prediction cache TTL in seconds
                    type: integer
                storage_ids:
                    items:
                        type: string
                    type: array
            type: object
        DigitalTwinCreateRequest:
            properties:
                config:
                    $ref: '#/components/schemas/DigitalTwinConfig'
                description:
                    description: Description
                    type: string
                name:
                    description: Digital twin name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
            required:
                - project_id
                - ontology_id
                - name
            type: object
        DigitalTwinUpdateRequest:
            properties:
                config:
                    $ref: '#/components/schemas/DigitalTwinConfig'
                description:
                    description: New description
                    type: string
                name:
                    description: New name
                    type: string
                status:
                    description: New status
                    type: string
            type: object
        Entity:
            properties:
                attributes:
                    additionalProperties: true
                    type: object
                computed_values:
                    additionalProperties: true
                    type: object
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                digital_twin_id:
                    description: Owning digital twin ID
                    type: string
                id:
                    description: Entity ID (UUID)
                    type: string
                is_modified:
                    description: Whether the entity has in-memory modifications
                    type: boolean
                modifications:
                    additionalProperties: true
                    type: object
                relationships:
                    items:
                        $ref: '#/components/schemas/EntityRelationship'
                    type: array
                source_data_id:
                    description: Optional source CIR record ID
                    type: string
                type:
                    description: Entity type from the ontology
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        EntityRelationship:
            properties:
                properties:
                    additionalProperties: true
                    type: object
                target_id:
                    description: Target entity ID
                    type: string
                target_type:
                    description: Target entity type
                    type: string
                type:
                    description: Relationship type from the ontology
                    type: string
            required:
                - type
                - target_id
                - target_type
            type: object
        ExternalStoragePlugin:
            properties:
                author:
                    description: Author from plugin.yaml
                    type: string
                description:
                    description: Description from plugin.yaml
                    type: string
                error_message:
                    description: Compilation or load error, if status=error
                    type: string
                git_commit_hash:
                    description: Commit SHA the current .so was compiled from
                    type: string
                installed_at:
                    description: ISO-8601 installation timestamp
                    type: string
                name:
                    description: Plugin name (derived from repository URL)
                    type: string
                repository_url:
                    description: Git repository URL
                    type: string
                status:
                    description: active | error
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
                version:
                    description: Version from plugin.yaml
                    type: string
            type: object
        ExternalStoragePluginInstallRequest:
            properties:
                git_ref:
                    description: 'Branch, tag, or commit SHA (default: main)'
                    type: string
                repository_url:
                    description: HTTPS Git URL of the storage plugin repository
                    type: string
            required:
                - repository_url
            type: object
        ExtractionRequest:
            properties:
                ontology_id:
                    description: Existing ontology to diff against (optional)
                    type: string
                project_id:
                    description: Project ID
                    type: string
                storage_id:
                    description: Storage config ID to extract from
                    type: string
            required:
                - project_id
                - storage_id
            type: object
        ExtractionResult:
            properties:
                diff:
                    description: OntologyDiff — added/removed/modified classes and properties
                    type: object
                needs_review:
                    description: True if the diff is significant enough to flag for human review
                    type: boolean
                ontology:
                    $ref: '#/components/schemas/Ontology'
            type: object
        IngestionHealthReport:
            properties:
                generated_at:
                    description: Report generation timestamp
                    type: string
                overall_score:
                    description: Project-level ingestion health score [0,1]
                    type: number
                project_id:
                    description: Project ID
                    type: string
                recommendations:
                    items:
                        type: string
                    type: array
                sources:
                    items:
                        $ref: '#/components/schemas/IngestionHealthSource'
                    type: array
                status:
                    description: healthy | warning | critical
                    type: string
            required:
                - project_id
                - generated_at
                - overall_score
                - status
                - sources
            type: object
        IngestionHealthSource:
            properties:
                completeness_score:
                    description: Completeness score [0,1]
                    type: number
                findings:
                    items:
                        type: string
                    type: array
                freshness_score:
                    description: Freshness score [0,1]
                    type: number
                last_ingested_at:
                    description: Latest ingestion timestamp in sample
                    type: string
                overall_score:
                    description: Weighted ingestion health score [0,1]
                    type: number
                plugin_type:
                    description: Storage backend plugin type
                    type: string
                sample_size:
                    description: Number of sampled CIR records
                    type: integer
                schema_drift_score:
                    description: Schema stability score [0,1], higher is better
                    type: number
                status:
                    description: healthy | warning | critical
                    type: string
                storage_id:
                    description: Storage config ID
                    type: string
            required:
                - storage_id
                - plugin_type
                - sample_size
                - freshness_score
                - completeness_score
                - schema_drift_score
                - overall_score
                - status
            type: object
        Insight:
            properties:
                confidence:
                    description: Insight confidence [0,1]
                    type: number
                created_at:
                    description: Creation timestamp
                    type: string
                evidence:
                    additionalProperties: true
                    type: object
                explanation:
                    description: Human-readable rationale
                    type: string
                id:
                    description: Insight ID (UUID)
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                run_id:
                    description: Analysis run that produced this insight
                    type: string
                severity:
                    description: low | medium | high | critical
                    type: string
                status:
                    description: Insight lifecycle state
                    type: string
                suggested_action:
                    description: Suggested follow-up action
                    type: string
                type:
                    description: anomaly_spike | trend_break | cooccurrence_surge | other generic detector type
                    type: string
                updated_at:
                    description: Update timestamp
                    type: string
            type: object
        InsightGenerateRequest:
            properties:
                project_id:
                    description: Project ID
                    type: string
            required:
                - project_id
            type: object
        MLModel:
            properties:
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Model description
                    type: string
                id:
                    description: ML model ID (UUID)
                    type: string
                is_recommended:
                    description: True if recommended by the recommendation engine
                    type: boolean
                metadata:
                    additionalProperties: true
                    type: object
                model_artifact_path:
                    description: Path to the serialised model artifact
                    type: string
                name:
                    description: Model name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                performance_metrics:
                    description: Latest performance metrics
                    type: object
                project_id:
                    description: Owning project ID
                    type: string
                recommendation_score:
                    description: Recommendation engine score
                    type: integer
                status:
                    description: draft | training | trained | failed | degraded | deprecated | archived
                    type: string
                training_config:
                    description: Training configuration
                    type: object
                training_metrics:
                    description: Metrics recorded during training
                    type: object
                type:
                    description: decision_tree | random_forest | regression | neural_network
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
                version:
                    description: Model version string
                    type: string
            type: object
        MLModelCreateRequest:
            properties:
                description:
                    description: Description
                    type: string
                name:
                    description: Model name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                training_config:
                    description: Training configuration
                    type: object
                type:
                    description: Model type
                    type: string
            required:
                - project_id
                - name
                - type
            type: object
        MLModelRecommendRequest:
            properties:
                ontology_id:
                    description: Ontology to base recommendation on
                    type: string
                project_id:
                    description: Project ID
                    type: string
                storage_id:
                    description: Storage config to sample data from
                    type: string
            required:
                - project_id
            type: object
        MLModelRecommendation:
            properties:
                alternatives:
                    items:
                        description: Alternative model type with score and reason
                        type: object
                    type: array
                reason:
                    description: Explanation
                    type: string
                recommended_type:
                    description: Recommended model type
                    type: string
                score:
                    description: Confidence score (0-100)
                    type: integer
            type: object
        MLModelUpdateRequest:
            properties:
                description:
                    description: New description
                    type: string
                name:
                    description: New name
                    type: string
                status:
                    description: New status
                    type: string
                training_config:
                    description: Updated training configuration
                    type: object
            type: object
        MLTrainingRequest:
            properties:
                model_id:
                    description: ID of the model to train
                    type: string
                storage_id:
                    description: Storage config to load training data from
                    type: string
            required:
                - model_id
            type: object
        MetricsResponse:
            properties:
                queue:
                    properties:
                        length:
                            description: Current queue depth
                            type: integer
                    type: object
                tasks_by_status:
                    additionalProperties:
                        type: integer
                    type: object
                tasks_by_type:
                    additionalProperties:
                        type: integer
                    type: object
                timestamp:
                    description: ISO-8601 UTC snapshot timestamp
                    type: string
            type: object
        Ontology:
            properties:
                content:
                    description: OWL/Turtle ontology content
                    type: string
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Ontology description
                    type: string
                id:
                    description: Ontology ID (UUID)
                    type: string
                name:
                    description: Ontology name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                status:
                    description: draft | active | needs_review | deprecated
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        OntologyCreateRequest:
            properties:
                content:
                    description: Initial OWL/Turtle content
                    type: string
                description:
                    description: Description
                    type: string
                name:
                    description: Ontology name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
            required:
                - project_id
                - name
            type: object
        OntologyUpdateRequest:
            properties:
                content:
                    description: Updated OWL/Turtle content
                    type: string
                description:
                    description: New description
                    type: string
                name:
                    description: New name
                    type: string
                status:
                    description: New status
                    type: string
            type: object
        OrderByClause:
            properties:
                attribute:
                    description: Attribute to sort by
                    type: string
                direction:
                    description: asc | desc (default asc)
                    type: string
            required:
                - attribute
            type: object
        Pipeline:
            properties:
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Pipeline description
                    type: string
                id:
                    description: Pipeline ID (UUID)
                    type: string
                name:
                    description: Pipeline name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                status:
                    description: Pipeline status
                    type: string
                steps:
                    items:
                        $ref: '#/components/schemas/PipelineStep'
                    type: array
                type:
                    description: ingestion | processing | output
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        PipelineCheckpoint:
            properties:
                checkpoint:
                    additionalProperties: true
                    type: object
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                pipeline_id:
                    description: Pipeline ID
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                scope:
                    description: Optional checkpoint scope
                    type: string
                step_name:
                    description: Pipeline step name
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
                version:
                    description: Optimistic lock version
                    type: integer
            required:
                - project_id
                - pipeline_id
                - step_name
                - version
                - checkpoint
            type: object
        PipelineCreateRequest:
            properties:
                description:
                    description: Pipeline description
                    type: string
                name:
                    description: Pipeline name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                steps:
                    items:
                        $ref: '#/components/schemas/PipelineStep'
                    type: array
                type:
                    description: Pipeline type
                    type: string
            required:
                - project_id
                - name
                - type
                - steps
            type: object
        PipelineExecutionRequest:
            properties:
                parameters:
                    additionalProperties: true
                    type: object
                pipeline_id:
                    description: Pipeline ID to execute
                    type: string
                trigger_type:
                    description: manual | scheduled | automatic
                    type: string
                triggered_by:
                    description: Trigger source identifier
                    type: string
            required:
                - pipeline_id
            type: object
        PipelineStep:
            properties:
                action:
                    description: Action name within the plugin
                    type: string
                name:
                    description: Step name (unique within pipeline)
                    type: string
                output:
                    additionalProperties:
                        type: string
                    type: object
                parameters:
                    additionalProperties: true
                    type: object
                plugin:
