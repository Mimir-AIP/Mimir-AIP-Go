            tags:
                - Storage
    /api/storage/configs/{id}:
        delete:
            description: Removes a storage configuration.
            parameters:
                - description: Storage config ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "204":
                    description: No content
                "404":
                    description: Not found
            summary: Delete storage config
            tags:
                - Storage
        get:
            description: Returns a single storage configuration.
            parameters:
                - description: Storage config ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StorageConfig'
                    description: "200"
                "404":
                    description: Not found
            summary: Get storage config
            tags:
                - Storage
        put:
            description: Updates a storage configuration.
            parameters:
                - description: Storage config ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/StorageConfigUpdateRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StorageConfig'
