    /api/worktasks:
        get:
            description: Returns the current work task queue depth.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    queue_length:
                                        description: Number of queued tasks
                                        type: integer
                                type: object
                    description: "200"
            summary: Get queue info
            tags:
                - Tasks
        post:
            description: Submits a new work task to the queue. Requires the worker auth token.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/WorkTaskSubmissionRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkTask'
                    description: "201"
                "400":
                    description: Bad request
            summary: Submit work task
            tags:
                - Tasks
    /api/worktasks/{id}:
        get:
            description: Returns a work task by ID. Requires the worker auth token.
            parameters:
                - description: Work task ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkTask'
                    description: "200"
                "404":
                    description: Not found
            summary: Get work task
            tags:
                - Tasks
        post:
            description: Called by workers to report task completion or failure. Requires the worker auth token.
            parameters:
                - description: Work task ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/WorkTaskResult'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: object
                    description: "200"
                "400":
                    description: Bad request
                "404":
                    description: Not found
            summary: Update work task status
            tags:
                - Tasks
    /health:
        get:
            description: Returns 200 when the orchestrator process is running.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    status:
                                        description: Always 'healthy'
                                        type: string
                                type: object
                    description: "200"
            summary: Health check
            tags:
                - System
    /ready:
        get:
            description: Returns 200 when the queue is accessible and the orchestrator is ready to serve requests.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    status:
                                        description: '''ready'' or ''not ready'''
                                        type: string
                                type: object
                    description: "200"
                "500":
                    description: Internal server error
            summary: Readiness check
            tags:
                - System
