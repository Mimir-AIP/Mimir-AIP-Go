components:
    schemas:
        ActionRequest:
            properties:
                action_type:
                    description: Type of action to apply
                    type: string
                parameters:
                    additionalProperties: true
                    type: object
            required:
                - action_type
            type: object
        ActionResult:
            properties:
                action_id:
                    description: Action ID
                    type: string
                applied_at:
                    description: ISO-8601 timestamp
                    type: string
                result:
                    additionalProperties: true
                    type: object
                status:
                    description: Action status
                    type: string
            type: object
        CIR:
            description: Common Internal Representation — the normalised record format used across all storage backends.
            properties:
                data:
                    additionalProperties: true
                    description: Record payload
                    type: object
                id:
                    description: CIR record ID
                    type: string
                metadata:
                    additionalProperties: true
                    description: Record metadata
                    type: object
                source:
                    additionalProperties: true
                    description: Provenance information
                    type: object
            type: object
        CIRCondition:
            properties:
                attribute:
                    description: Attribute name
                    type: string
                operator:
                    description: eq | neq | gt | gte | lt | lte | in | like
                    type: string
                value:
                    description: Filter value
            required:
                - attribute
                - operator
                - value
            type: object
        CIRQuery:
            properties:
                entity_type:
                    description: Filter by entity type
                    type: string
                filters:
                    items:
                        $ref: '#/components/schemas/CIRCondition'
                    type: array
                limit:
                    description: Maximum results
                    type: integer
                offset:
                    description: Pagination offset
                    type: integer
                order_by:
                    items:
                        $ref: '#/components/schemas/OrderByClause'
                    type: array
            type: object
        DigitalTwin:
            properties:
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Description
                    type: string
                entity_count:
                    description: Number of entities in the graph
                    type: integer
                id:
                    description: Digital twin ID (UUID)
                    type: string
                metadata:
                    additionalProperties: true
                    type: object
                name:
                    description: Digital twin name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                status:
                    description: initialising | active | syncing | error
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        DigitalTwinCreateRequest:
            properties:
                description:
                    description: Description
                    type: string
                name:
                    description: Digital twin name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
            required:
                - project_id
                - name
            type: object
        DigitalTwinUpdateRequest:
            properties:
                description:
                    description: New description
                    type: string
                name:
                    description: New name
                    type: string
                ontology_id:
                    description: New linked ontology ID
                    type: string
            type: object
        Entity:
            properties:
                attributes:
                    additionalProperties: true
                    type: object
                computed_values:
                    additionalProperties: true
                    type: object
                id:
                    description: Entity ID (UUID)
                    type: string
                last_updated:
                    description: ISO-8601 last-updated timestamp
                    type: string
                relationships:
                    items:
                        description: Relationship to another entity
                        type: object
                    type: array
                type:
                    description: Entity type (from ontology)
                    type: string
            type: object
        ExternalStoragePlugin:
            properties:
                author:
                    description: Author from plugin.yaml
                    type: string
                description:
                    description: Description from plugin.yaml
                    type: string
                error_message:
                    description: Compilation or load error, if status=error
                    type: string
                git_commit_hash:
                    description: Commit SHA the current .so was compiled from
                    type: string
                installed_at:
                    description: ISO-8601 installation timestamp
                    type: string
                name:
                    description: Plugin name (derived from repository URL)
                    type: string
                repository_url:
                    description: Git repository URL
                    type: string
                status:
                    description: active | error
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
                version:
                    description: Version from plugin.yaml
                    type: string
            type: object
        ExternalStoragePluginInstallRequest:
            properties:
                git_ref:
                    description: 'Branch, tag, or commit SHA (default: main)'
                    type: string
                repository_url:
                    description: HTTPS Git URL of the storage plugin repository
                    type: string
            required:
                - repository_url
            type: object
        ExtractionRequest:
            properties:
                ontology_id:
                    description: Existing ontology to diff against (optional)
                    type: string
                project_id:
                    description: Project ID
                    type: string
                storage_id:
                    description: Storage config ID to extract from
                    type: string
            required:
                - project_id
                - storage_id
            type: object
        ExtractionResult:
            properties:
                diff:
                    description: OntologyDiff — added/removed/modified classes and properties
                    type: object
                needs_review:
                    description: True if the diff is significant enough to flag for human review
                    type: boolean
                ontology:
                    $ref: '#/components/schemas/Ontology'
            type: object
        MLModel:
            properties:
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Model description
                    type: string
                id:
                    description: ML model ID (UUID)
                    type: string
                is_recommended:
                    description: True if recommended by the recommendation engine
                    type: boolean
                metadata:
                    additionalProperties: true
                    type: object
                model_artifact_path:
                    description: Path to the serialised model artifact
                    type: string
                name:
                    description: Model name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                performance_metrics:
                    description: Latest performance metrics
                    type: object
                project_id:
                    description: Owning project ID
                    type: string
                recommendation_score:
                    description: Recommendation engine score
                    type: integer
                status:
                    description: draft | training | trained | failed | degraded | deprecated | archived
                    type: string
                training_config:
                    description: Training configuration
                    type: object
                training_metrics:
                    description: Metrics recorded during training
                    type: object
                type:
                    description: decision_tree | random_forest | regression | neural_network
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
                version:
                    description: Model version string
                    type: string
            type: object
        MLModelCreateRequest:
            properties:
                description:
                    description: Description
                    type: string
                name:
                    description: Model name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                training_config:
                    description: Training configuration
                    type: object
                type:
                    description: Model type
                    type: string
            required:
                - project_id
                - name
                - type
            type: object
        MLModelRecommendRequest:
            properties:
                ontology_id:
                    description: Ontology to base recommendation on
                    type: string
                project_id:
                    description: Project ID
                    type: string
                storage_id:
                    description: Storage config to sample data from
                    type: string
            required:
                - project_id
            type: object
        MLModelRecommendation:
            properties:
                alternatives:
                    items:
                        description: Alternative model type with score and reason
                        type: object
                    type: array
                reason:
                    description: Explanation
                    type: string
                recommended_type:
                    description: Recommended model type
                    type: string
                score:
                    description: Confidence score (0-100)
                    type: integer
            type: object
        MLModelUpdateRequest:
            properties:
                description:
                    description: New description
                    type: string
                name:
                    description: New name
                    type: string
                status:
                    description: New status
                    type: string
                training_config:
                    description: Updated training configuration
                    type: object
            type: object
        MLTrainingRequest:
            properties:
                model_id:
                    description: ID of the model to train
                    type: string
                storage_id:
                    description: Storage config to load training data from
                    type: string
            required:
                - model_id
            type: object
        MetricsResponse:
            properties:
                queue:
                    properties:
                        length:
                            description: Current queue depth
                            type: integer
                    type: object
                tasks_by_status:
                    additionalProperties:
                        type: integer
                    type: object
                tasks_by_type:
                    additionalProperties:
                        type: integer
                    type: object
                timestamp:
                    description: ISO-8601 UTC snapshot timestamp
                    type: string
            type: object
        Ontology:
            properties:
                content:
                    description: OWL/Turtle ontology content
                    type: string
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Ontology description
                    type: string
                id:
                    description: Ontology ID (UUID)
                    type: string
                name:
                    description: Ontology name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                status:
                    description: draft | active | needs_review | deprecated
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        OntologyCreateRequest:
            properties:
                content:
                    description: Initial OWL/Turtle content
                    type: string
                description:
                    description: Description
                    type: string
                name:
                    description: Ontology name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
            required:
                - project_id
                - name
            type: object
        OntologyUpdateRequest:
            properties:
                content:
                    description: Updated OWL/Turtle content
                    type: string
                description:
                    description: New description
                    type: string
                name:
                    description: New name
                    type: string
                status:
                    description: New status
                    type: string
            type: object
        OrderByClause:
            properties:
                attribute:
                    description: Attribute to sort by
                    type: string
                direction:
                    description: asc | desc (default asc)
                    type: string
            required:
                - attribute
            type: object
        Pipeline:
            properties:
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Pipeline description
                    type: string
                id:
                    description: Pipeline ID (UUID)
                    type: string
                name:
                    description: Pipeline name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                status:
                    description: Pipeline status
                    type: string
                steps:
                    items:
                        $ref: '#/components/schemas/PipelineStep'
                    type: array
                type:
                    description: ingestion | processing | output
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        PipelineCreateRequest:
            properties:
                description:
                    description: Pipeline description
                    type: string
                name:
                    description: Pipeline name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                steps:
                    items:
                        $ref: '#/components/schemas/PipelineStep'
                    type: array
                type:
                    description: Pipeline type
                    type: string
            required:
                - project_id
                - name
                - type
                - steps
            type: object
        PipelineExecutionRequest:
            properties:
                parameters:
                    additionalProperties: true
                    type: object
                pipeline_id:
                    description: Pipeline ID to execute
                    type: string
                trigger_type:
                    description: manual | scheduled | automatic
                    type: string
                triggered_by:
                    description: Trigger source identifier
                    type: string
            required:
                - pipeline_id
            type: object
        PipelineStep:
            properties:
                action:
                    description: Action name within the plugin
                    type: string
                name:
                    description: Step name (unique within pipeline)
                    type: string
                output:
                    additionalProperties:
                        type: string
                    type: object
                parameters:
                    additionalProperties: true
                    type: object
                plugin:
                    description: Plugin name or 'default' for built-in actions
                    type: string
            required:
                - name
                - plugin
                - action
            type: object
        PipelineUpdateRequest:
            properties:
                description:
                    description: New description
                    type: string
                status:
                    description: New status
                    type: string
                steps:
                    items:
                        $ref: '#/components/schemas/PipelineStep'
                    type: array
            type: object
        Plugin:
            properties:
                actions:
                    items:
                        type: string
                    type: array
                author:
                    description: Plugin author
                    type: string
                description:
                    description: Plugin description
                    type: string
                installed_at:
                    description: ISO-8601 installation timestamp
                    type: string
                name:
                    description: Plugin name
                    type: string
                repository_url:
                    description: Git repository URL
                    type: string
                version:
                    description: Plugin version
                    type: string
            type: object
        PluginInstallRequest:
            properties:
                git_ref:
                    description: 'Branch, tag, or commit SHA (default: main)'
                    type: string
                repository_url:
                    description: HTTPS Git URL of the plugin repository
                    type: string
            required:
                - repository_url
            type: object
        PluginUpdateRequest:
            properties:
                git_ref:
                    description: Branch, tag, or commit SHA to update to
                    type: string
            type: object
        Project:
            properties:
                components:
                    properties:
                        digital_twins:
                            items:
                                type: string
                            type: array
                        ml_models:
                            items:
                                type: string
                            type: array
                        ontologies:
                            items:
                                type: string
                            type: array
                        pipelines:
                            items:
                                type: string
                            type: array
                        storage:
                            items:
                                type: string
                            type: array
                    type: object
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Project description
                    type: string
                id:
                    description: Project ID (UUID)
                    type: string
                name:
                    description: Project name
                    type: string
                status:
                    description: active | archived
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        ProjectCloneRequest:
            properties:
                name:
                    description: Name for the cloned project
                    type: string
                project_id:
                    description: ID of the project to clone
                    type: string
            required:
                - project_id
                - name
            type: object
        ProjectCreateRequest:
            properties:
                description:
                    description: Project description
                    type: string
                name:
                    description: Project name
                    type: string
            required:
                - name
            type: object
        ProjectUpdateRequest:
            properties:
                description:
                    description: New description
                    type: string
                name:
                    description: New name
                    type: string
                status:
                    description: New status
                    type: string
            type: object
        ScenarioRequest:
            properties:
                modifications:
                    items:
                        description: Entity attribute modification
                        type: object
                    type: array
                scenario_id:
                    description: Optional scenario ID (generated if omitted)
                    type: string
            required:
                - modifications
            type: object
        ScenarioResult:
            properties:
                created_at:
                    description: ISO-8601 timestamp
                    type: string
                entities:
                    items:
                        $ref: '#/components/schemas/Entity'
                    type: array
                predictions:
                    additionalProperties: true
                    type: object
                scenario_id:
                    description: Scenario ID
                    type: string
            type: object
        Schedule:
            properties:
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                cron:
                    description: Cron expression (e.g. '0 * * * *')
                    type: string
                enabled:
                    description: Whether the schedule is active
                    type: boolean
                id:
                    description: Schedule ID (UUID)
                    type: string
                name:
                    description: Schedule name
                    type: string
                pipeline_ids:
                    items:
                        type: string
                    type: array
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        ScheduleCreateRequest:
            properties:
                cron:
                    description: Cron expression
                    type: string
                enabled:
                    description: Start enabled (default true)
                    type: boolean
                name:
                    description: Schedule name
                    type: string
                pipeline_ids:
                    items:
                        type: string
                    type: array
            required:
                - name
                - cron
                - pipeline_ids
            type: object
        ScheduleUpdateRequest:
            properties:
                cron:
                    description: New cron expression
                    type: string
                enabled:
                    description: Enable or disable
                    type: boolean
                name:
                    description: New name
                    type: string
                pipeline_ids:
                    items:
                        type: string
                    type: array
            type: object
        StorageConfig:
            properties:
                active:
                    description: Whether this config is active
                    type: boolean
                config:
                    additionalProperties: true
                    type: object
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                id:
                    description: Storage config ID (UUID)
                    type: string
                ontology_id:
                    description: Optional linked ontology ID
                    type: string
                plugin_type:
                    description: filesystem | postgresql | mysql | mongodb | s3 | redis | elasticsearch | neo4j | <custom>
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        StorageConfigCreateRequest:
            properties:
                config:
                    additionalProperties: true
                    type: object
                ontology_id:
                    description: Optional linked ontology ID
                    type: string
                plugin_type:
                    description: Backend type
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
            required:
                - project_id
                - plugin_type
                - config
            type: object
        StorageConfigUpdateRequest:
            properties:
                active:
                    description: Active flag
                    type: boolean
                config:
                    additionalProperties: true
                    type: object
                ontology_id:
                    description: Linked ontology ID
                    type: string
            type: object
        StorageDeleteRequest:
            properties:
                project_id:
                    description: Project ID
                    type: string
                query:
                    $ref: '#/components/schemas/CIRQuery'
                storage_id:
                    description: Storage config ID
                    type: string
            required:
                - project_id
                - storage_id
                - query
            type: object
        StorageQueryRequest:
            properties:
                project_id:
                    description: Project ID
                    type: string
                query:
                    $ref: '#/components/schemas/CIRQuery'
                storage_id:
                    description: Storage config ID
                    type: string
            required:
                - project_id
                - storage_id
            type: object
        StorageResult:
            properties:
                affected_items:
                    description: Number of records affected
                    type: integer
                error:
                    description: Error message if unsuccessful
                    type: string
                success:
                    description: Whether the operation succeeded
                    type: boolean
            type: object
        StorageStoreRequest:
            properties:
                cir_data:
                    $ref: '#/components/schemas/CIR'
                project_id:
                    description: Project ID
                    type: string
                storage_id:
                    description: Storage config ID
                    type: string
            required:
                - project_id
                - storage_id
                - cir_data
            type: object
        StorageUpdateRequest:
            properties:
                project_id:
                    description: Project ID
                    type: string
                query:
                    $ref: '#/components/schemas/CIRQuery'
                storage_id:
                    description: Storage config ID
                    type: string
                updates:
                    properties:
                        filters:
                            items:
                                $ref: '#/components/schemas/CIRCondition'
                            type: array
                        updates:
                            additionalProperties: true
                            type: object
                    type: object
            required:
                - project_id
                - storage_id
                - query
                - updates
            type: object
        WorkTask:
            properties:
                completed_at:
                    description: ISO-8601 completion timestamp
                    type: string
                error_message:
                    description: Error message if task failed
                    type: string
                id:
                    description: Work task ID (UUID)
                    type: string
                max_retries:
                    description: Maximum retry attempts
                    type: integer
                priority:
                    description: Task priority (higher = processed first)
                    type: integer
                project_id:
                    description: Owning project ID
                    type: string
                resource_requirements:
                    additionalProperties: true
                    type: object
                retry_count:
                    description: Number of retries so far
                    type: integer
                started_at:
                    description: ISO-8601 start timestamp
                    type: string
                status:
                    description: queued | running | completed | failed
                    type: string
                submitted_at:
                    description: ISO-8601 submission timestamp
                    type: string
                task_spec:
                    additionalProperties: true
                    type: object
                type:
                    description: pipeline_execution | ml_training | ml_inference | digital_twin_update
                    type: string
            type: object
        WorkTaskResult:
            properties:
                error_message:
                    description: Error message if failed
                    type: string
                result:
                    additionalProperties: true
                    type: object
                status:
                    description: completed | failed
                    type: string
            required:
                - status
            type: object
        WorkTaskSubmissionRequest:
            properties:
                data_access:
                    additionalProperties: true
                    type: object
                priority:
                    description: Task priority
                    type: integer
                project_id:
                    description: Owning project ID
                    type: string
                resource_requirements:
                    additionalProperties: true
                    type: object
                task_spec:
                    additionalProperties: true
                    type: object
                type:
                    description: Task type
                    type: string
            required:
                - type
                - project_id
            type: object
info:
    contact:
        name: Mimir AIP
        url: https://github.com/Mimir-AIP/Mimir-AIP-Go
    description: REST API for the Mimir AIP orchestrator. This specification is generated automatically from inline route registrations — it stays in sync with the codebase by construction.
    license:
        name: See repository
        url: https://github.com/Mimir-AIP/Mimir-AIP-Go/blob/main/LICENSE
    title: Mimir AIP REST API
    version: 0.1.0
openapi: 3.0.3
paths:
    /api/digital-twins:
        get:
            description: Returns all digital twins for a project.
            parameters:
                - description: Filter by project ID
                  in: query
                  name: project_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/DigitalTwin'
                                type: array
                    description: 200 OK
            summary: List digital twins
            tags:
                - Digital Twins
        post:
            description: Creates a new digital twin and initialises its entity graph from the associated ontology.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/DigitalTwinCreateRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DigitalTwin'
                    description: Created
                "400":
                    description: Bad request — invalid input
            summary: Create digital twin
            tags:
                - Digital Twins
    /api/digital-twins/{id}:
        delete:
            description: ""
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "204":
                    description: No content
                "404":
                    description: Resource not found
            summary: Delete digital twin
            tags:
                - Digital Twins
        get:
            description: ""
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DigitalTwin'
                    description: 200 OK
                "404":
                    description: Resource not found
            summary: Get digital twin
            tags:
                - Digital Twins
        put:
            description: ""
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/DigitalTwinUpdateRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DigitalTwin'
                    description: 200 OK
                "400":
                    description: Bad request — invalid input
                "404":
                    description: Resource not found
            summary: Update digital twin
            tags:
                - Digital Twins
    /api/digital-twins/{id}/actions:
        get:
            description: ""
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/Action'
                                type: array
                    description: 200 OK
            summary: List actions
            tags:
                - Digital Twins
        post:
            description: Registers an action that can be applied to entities within the digital twin.
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ActionCreateRequest'
                required: true
