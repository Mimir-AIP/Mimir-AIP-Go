---
# Service account for the orchestrator — has permissions to manage worker Jobs/Pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mimir-orchestrator
  namespace: mimir-aip
  labels:
    app: mimir-aip
    component: orchestrator
---
# Service account for workers — minimal identity for pod execution
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mimir-worker
  namespace: mimir-aip
  labels:
    app: mimir-aip
    component: worker
---
# ClusterRole granting the orchestrator the ability to manage Jobs and Pods
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mimir-orchestrator-role
  labels:
    app: mimir-aip
    component: orchestrator
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
---
# Bind the ClusterRole to the orchestrator service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mimir-orchestrator-rolebinding
  labels:
    app: mimir-aip
    component: orchestrator
subjects:
- kind: ServiceAccount
  name: mimir-orchestrator
  namespace: mimir-aip
roleRef:
  kind: ClusterRole
  name: mimir-orchestrator-role
  apiGroup: rbac.authorization.k8s.io
