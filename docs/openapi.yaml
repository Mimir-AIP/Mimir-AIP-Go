            tags:
                - Storage
    /api/storage/health:
        post:
            description: Tests the connection to a storage backend.
            requestBody:
                content:
                    application/json:
                        schema:
                            properties:
                                storage_id:
                                    description: ID of the storage config to check
                                    type: string
                            required:
                                - storage_id
                            type: object
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        description: Error message if unhealthy
                                        type: string
                                    healthy:
                                        description: True if the backend is reachable
                                        type: boolean
                                type: object
                    description: "200"
            summary: Storage health check
            tags:
                - Storage
