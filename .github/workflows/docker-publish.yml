name: Build and publish Docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: orchestrator
            context: .
            dockerfile: cmd/orchestrator/Dockerfile
          - name: worker
            context: .
            dockerfile: cmd/worker/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image prefix
        # Docker image names must be lowercase; github.repository_owner may have mixed case
        # (e.g. Mimir-AIP → mimir-aip). Bash ${VAR,,} lowercases the value.
        run: echo "IMAGE_PREFIX=ghcr.io/${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Skip login on pull_request events from forks (no write permission)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}
          tags: |
            # Branch push → branch name (e.g. main)
            type=ref,event=branch
            # PR → pr-<number>
            type=ref,event=pr
            # Version tag v1.2.3 → 1.2.3 and latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Always tag the git SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs using the GitHub Actions cache
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
