                - Schedules
    /api/storage/configs:
        get:
            description: Returns all storage configurations.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/StorageConfig'
                                type: array
                    description: "200"
            summary: List storage configs
            tags:
                - Storage
        post:
            description: Registers a new storage backend configuration.
            requestBody:
                content:
                    application/json:
