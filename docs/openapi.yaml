                            description: Monotonic relationship revision number
                            type: integer
                        source_entity_id:
                            description: Source entity ID
                            type: string
                        sync_run_id:
                            description: Sync run that emitted this relationship change
                            type: string
                        target_entity_id:
                            description: Target entity ID
                            type: string
                    type: object
                TwinSnapshot:
                    properties:
                        created_at:
                            description: ISO-8601 snapshot timestamp
                            type: string
                        digital_twin_id:
                            description: Owning digital twin ID
                            type: string
                        entity_revision_high_watermark:
                            description: Highest entity revision represented in the snapshot
                            type: integer
                        id:
                            description: Twin snapshot ID (UUID)
                            type: string
                        metadata:
                            additionalProperties: true
                            type: object
                        relationship_revision_high_watermark:
                            description: Highest relationship revision represented in the snapshot
                            type: integer
                        snapshot_kind:
                            description: full | checkpoint | branch_base
                            type: string
                        sync_run_id:
                            description: Sync run that produced this snapshot
                            type: string
                    type: object
                base_snapshot_id:
                    description: Optional snapshot anchor ID
                    type: string
                completed_at:
                    description: ISO-8601 run completion timestamp
                    type: string
                digital_twin_id:
                    description: Owning digital twin ID
                    type: string
                entity_revision_high_watermark:
                    description: Highest entity revision seen when the run completed
                    type: integer
                error:
                    description: Failure reason when status=failed
                    type: string
                id:
                    description: Twin sync run ID (UUID)
                    type: string
                ontology_version:
                    description: Ontology version used during this sync run
                    type: string
                reconciliation_strategy:
                    description: source_priority | freshest
                    type: string
                source_ids:
                    items:
                        type: string
                    type: array
                started_at:
                    description: ISO-8601 run start timestamp
                    type: string
                status:
                    description: running | completed | failed
                    type: string
                summary:
                    additionalProperties: true
                    type: object
                trigger_type:
                    description: manual | pipeline_completed | webhook | scheduled | system
                    type: string
                triggered_by:
                    description: Trigger actor or reference
                    type: string
            type: object
        WorkTask:
            properties:
                completed_at:
                    description: ISO-8601 completion timestamp
                    type: string
                error_message:
                    description: Error message if task failed
                    type: string
                id:
                    description: Work task ID (UUID)
                    type: string
                max_retries:
                    description: Maximum retry attempts
                    type: integer
                output_location:
                    description: Worker output location, if any
                    type: string
                priority:
                    description: Task priority (higher = processed first)
                    type: integer
                project_id:
                    description: Owning project ID
                    type: string
                resource_requirements:
                    additionalProperties: true
                    type: object
                result_metadata:
                    additionalProperties: true
                    type: object
                retry_count:
                    description: Number of retries so far
                    type: integer
                started_at:
                    description: ISO-8601 start timestamp
                    type: string
                status:
                    description: queued | scheduled | spawned | executing | completed | failed | timeout | cancelled
                    type: string
                submitted_at:
                    description: ISO-8601 submission timestamp
                    type: string
                task_spec:
                    additionalProperties: true
                    type: object
                type:
                    description: pipeline_execution | ml_training | ml_inference | digital_twin_processing
                    type: string
            type: object
        WorkTaskListResponse:
            properties:
                queue_length:
                    description: Number of currently queued tasks
                    type: integer
                tasks:
                    items:
                        $ref: '#/components/schemas/WorkTask'
                    type: array
            required:
                - tasks
                - queue_length
            type: object
        WorkTaskResult:
            properties:
                error_message:
                    description: Error message if failed
                    type: string
                metadata:
                    additionalProperties: true
                    type: object
                output_location:
                    description: Worker output location, if any
                    type: string
                status:
                    description: queued | scheduled | spawned | executing | completed | failed | timeout | cancelled
                    type: string
            required:
                - status
            type: object
        WorkTaskSubmissionRequest:
            properties:
                data_access:
                    additionalProperties: true
                    type: object
                priority:
                    description: Task priority
                    type: integer
                project_id:
                    description: Owning project ID
                    type: string
                resource_requirements:
                    additionalProperties: true
                    type: object
                task_spec:
                    additionalProperties: true
                    type: object
                type:
                    description: Task type
                    type: string
            required:
                - type
                - project_id
            type: object
info:
    contact:
        name: Mimir AIP
        url: https://github.com/Mimir-AIP/Mimir-AIP-Go
    description: REST API for the Mimir AIP orchestrator. This specification is generated automatically from inline route registrations — it stays in sync with the codebase by construction.
    license:
        name: See repository
        url: https://github.com/Mimir-AIP/Mimir-AIP-Go/blob/main/LICENSE
    title: Mimir AIP REST API
    version: 0.1.0
openapi: 3.0.3
paths:
    /api/admin/settings/factory-reset:
        post:
            description: Deletes all persisted Mimir metadata and clears the in-memory work queue after confirming there are no queued or active tasks. External data stored in connected storage backends is not deleted.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/FactoryResetResponse'
                    description: 200 OK
                "409":
                    description: Conflict — reset blocked while queued or active tasks exist
                "500":
                    description: Internal server error
            summary: Factory reset metadata
            tags:
                - System
    /api/analysis/resolver:
        post:
            description: Detects cross-source links, persists a review queue for uncertain links, and records resolver calibration metrics.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ResolverRunRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                description: Resolver run result
                                type: object
                    description: Created
                "400":
                    description: Bad request — invalid input
            summary: Run cross-source resolver analysis
            tags:
                - Analysis
    /api/analysis/resolver/metrics:
        get:
            description: Returns high-confidence precision and prior resolver run metrics over time for one project.
            parameters:
                - description: Project ID
                  in: query
                  name: project_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                description: Resolver metrics
                                type: object
                    description: 200 OK
                "400":
                    description: Bad request — invalid input
            summary: Get resolver precision metrics
            tags:
                - Analysis
    /api/digital-twins:
        get:
            description: Returns all digital twins for a project.
            parameters:
                - description: Filter by project ID
                  in: query
                  name: project_id
                  required: true
