components:
    schemas:
        Action:
            properties:
                condition:
                    $ref: '#/components/schemas/ActionCondition'
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Description
                    type: string
                digital_twin_id:
                    description: Owning digital twin ID
                    type: string
                enabled:
                    description: Whether the action is active
                    type: boolean
                id:
                    description: Action ID (UUID)
                    type: string
                last_triggered:
                    description: ISO-8601 timestamp of the most recent trigger
                    type: string
                name:
                    description: Action name
                    type: string
                trigger:
                    $ref: '#/components/schemas/ActionTrigger'
                trigger_count:
                    description: Number of times the action has fired
                    type: integer
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        ActionCondition:
            properties:
                attribute:
                    description: Optional entity attribute for attribute-based conditions
                    type: string
                entity_type:
                    description: Optional entity type filter
                    type: string
                model_id:
                    description: Optional model ID for prediction-based conditions
                    type: string
                operator:
                    description: gt | gte | lt | lte | eq | ne
                    type: string
                threshold:
                    description: Comparison threshold value
            required:
                - operator
                - threshold
            type: object
        ActionCreateRequest:
            properties:
                condition:
                    $ref: '#/components/schemas/ActionCondition'
                description:
                    description: Description
                    type: string
                enabled:
                    description: Whether the action starts enabled
                    type: boolean
                name:
                    description: Action name
                    type: string
                trigger:
                    $ref: '#/components/schemas/ActionTrigger'
            required:
                - name
                - condition
                - trigger
            type: object
        ActionSchema:
            properties:
                description:
                    description: Action description
                    type: string
                name:
                    description: Action name used in pipeline steps
                    type: string
                parameters:
                    items:
                        $ref: '#/components/schemas/ParameterSchema'
                    type: array
                returns:
                    items:
                        $ref: '#/components/schemas/ReturnSchema'
                    type: array
            required:
                - name
            type: object
        ActionTrigger:
            properties:
                approval_mode:
                    description: automatic | manual
                    type: string
                parameters:
                    additionalProperties: true
                    type: object
                pipeline_id:
                    description: Pipeline ID to execute when the action fires
                    type: string
            required:
                - pipeline_id
            type: object
        AlertApprovalRequest:
            properties:
                actor:
                    description: Optional operator identity
                    type: string
                decision:
                    description: approve | reject
                    type: string
                note:
                    description: Optional approval note
                    type: string
            required:
                - decision
            type: object
        AlertEvent:
            properties:
                action_id:
                    description: Digital-twin action that matched
                    type: string
                approval_actor:
                    description: Operator or actor that resolved the approval
                    type: string
                approval_note:
                    description: Optional approval note
                    type: string
                approval_requested_at:
                    description: When manual approval was requested
                    type: string
                approval_resolved_at:
                    description: When manual approval was resolved
                    type: string
                approval_status:
                    description: not_required | pending | approved | rejected
                    type: string
                automation_id:
                    description: Automation that emitted the alert
                    type: string
                category:
                    description: Alert category
                    type: string
                created_at:
                    description: Alert event timestamp
                    type: string
                digital_twin_id:
                    description: Owning digital twin ID
                    type: string
                entity_refs:
                    items:
                        type: string
                    type: array
                execution_error:
                    description: Pipeline queueing error when action execution failed
                    type: string
                execution_status:
                    description: pending_approval | queued | failed | rejected | skipped | not_applicable
                    type: string
                id:
                    description: Alert event ID (UUID)
                    type: string
                message:
                    description: Alert message
                    type: string
                ontology_context:
                    additionalProperties: true
                    type: object
                processing_run_id:
                    description: Processing run that emitted the alert
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                requested_export_pipeline_id:
                    description: Export pipeline requested by the action
                    type: string
                requested_trigger_params:
                    additionalProperties: true
                    type: object
                severity:
                    description: low | medium | high | critical
                    type: string
                source_insight_id:
                    description: Optional source insight ID
                    type: string
                title:
                    description: Alert title
                    type: string
                triggered_export_pipeline_id:
                    description: Export pipeline triggered by this alert, if any
                    type: string
                triggered_work_task_id:
                    description: Triggered export work task ID, if any
                    type: string
            type: object
        AnalysisRun:
            properties:
                algorithm_version:
                    description: Detector/resolver algorithm version
                    type: string
                completed_at:
                    description: Run completion timestamp
                    type: string
                coverage:
                    additionalProperties: true
                    type: object
                created_at:
                    description: Run creation timestamp
                    type: string
                error:
                    description: Failure message, when status=failed
                    type: string
                id:
                    description: Analysis run ID (UUID)
                    type: string
                kind:
                    description: resolver | insights
                    type: string
                metrics:
                    additionalProperties: true
                    type: object
                policy_version:
                    description: Resolver policy version string
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                source_ids:
                    items:
                        type: string
                    type: array
                status:
                    description: completed | failed
                    type: string
            type: object
        Automation:
            properties:
                action_config:
                    additionalProperties: true
                    type: object
                action_type:
                    description: process_twin | trigger_export_pipeline
                    type: string
                condition_config:
                    additionalProperties: true
                    type: object
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Description
                    type: string
                enabled:
                    description: Whether the automation is active
                    type: boolean
                id:
                    description: Automation ID (UUID)
                    type: string
                name:
                    description: Automation name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                target_id:
                    description: Target resource ID
                    type: string
                target_type:
                    description: pipeline | digital_twin
                    type: string
                trigger_config:
                    additionalProperties: true
                    type: object
                trigger_type:
                    description: pipeline_completed | manual
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        AutomationCreateRequest:
            properties:
                action_config:
                    additionalProperties: true
                    type: object
                action_type:
                    description: process_twin | trigger_export_pipeline
                    type: string
                condition_config:
                    additionalProperties: true
                    type: object
                description:
                    description: Description
                    type: string
                enabled:
                    description: Whether the automation starts enabled
                    type: boolean
                name:
                    description: Automation name
                    type: string
                target_id:
                    description: Target resource ID (overridden for twin-scoped routes)
                    type: string
                target_type:
                    description: pipeline | digital_twin (overridden for twin-scoped routes)
                    type: string
                trigger_config:
                    additionalProperties: true
                    type: object
                trigger_type:
                    description: pipeline_completed | manual
                    type: string
            required:
                - name
            type: object
        AutomationUpdateRequest:
            properties:
                action_config:
                    additionalProperties: true
                    type: object
                action_type:
                    description: process_twin | trigger_export_pipeline
                    type: string
                condition_config:
                    additionalProperties: true
                    type: object
                description:
                    description: Description
                    type: string
                enabled:
                    description: Whether the automation is active
                    type: boolean
                name:
                    description: Automation name
                    type: string
                trigger_config:
                    additionalProperties: true
                    type: object
                trigger_type:
                    description: pipeline_completed | manual
                    type: string
            type: object
        CIR:
            description: Common Internal Representation — the normalised record format used across all storage backends.
            properties:
                data:
                    additionalProperties: true
                    description: Record payload
                    type: object
                id:
                    description: CIR record ID
                    type: string
                metadata:
                    additionalProperties: true
                    description: Record metadata
                    type: object
                source:
                    additionalProperties: true
                    description: Provenance information
                    type: object
            type: object
        CIRCondition:
            properties:
                attribute:
                    description: Attribute name
                    type: string
                operator:
                    description: eq | neq | gt | gte | lt | lte | in | like
                    type: string
                value:
                    description: Filter value
            required:
                - attribute
                - operator
                - value
            type: object
        CIRQuery:
            properties:
                entity_type:
                    description: Filter by entity type
                    type: string
                filters:
                    items:
                        $ref: '#/components/schemas/CIRCondition'
                    type: array
                limit:
                    description: Maximum results
                    type: integer
                offset:
                    description: Pagination offset
                    type: integer
                order_by:
                    items:
                        $ref: '#/components/schemas/OrderByClause'
                    type: array
            type: object
        DigitalTwin:
            properties:
                config:
                    $ref: '#/components/schemas/DigitalTwinConfig'
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Description
                    type: string
                id:
                    description: Digital twin ID (UUID)
                    type: string
                last_sync_at:
                    description: ISO-8601 timestamp of the most recent completed sync
                    type: string
                metadata:
                    additionalProperties: true
                    type: object
                name:
                    description: Digital twin name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                status:
                    description: active | syncing | error
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        DigitalTwinConfig:
            properties:
                custom_settings:
                    additionalProperties:
                        type: string
                    type: object
                enable_predictions:
                    description: Whether prediction endpoints are enabled for this twin
                    type: boolean
                prediction_cache_ttl:
                    description: Prediction cache TTL in seconds
                    type: integer
                reconciliation:
                    $ref: '#/components/schemas/DigitalTwinReconciliationPolicy'
                storage_ids:
                    items:
                        type: string
                    type: array
            type: object
        DigitalTwinCreateRequest:
            properties:
                config:
                    $ref: '#/components/schemas/DigitalTwinConfig'
                description:
                    description: Description
                    type: string
                name:
                    description: Digital twin name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
            required:
                - project_id
                - ontology_id
                - name
            type: object
        DigitalTwinReconciliationPolicy:
            properties:
                source_priority:
                    items:
                        type: string
                    type: array
                strategy:
                    description: source_priority | freshest
                    type: string
            type: object
        DigitalTwinUpdateRequest:
            properties:
                config:
                    $ref: '#/components/schemas/DigitalTwinConfig'
                description:
                    description: New description
                    type: string
                name:
                    description: New name
                    type: string
                status:
                    description: New status
                    type: string
            type: object
        Entity:
            properties:
                attributes:
                    additionalProperties: true
                    type: object
                computed_values:
                    additionalProperties: true
                    type: object
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                digital_twin_id:
                    description: Owning digital twin ID
                    type: string
                id:
                    description: Entity ID (UUID)
                    type: string
                is_modified:
                    description: Whether the entity has in-memory modifications
                    type: boolean
                modifications:
                    additionalProperties: true
                    type: object
                relationships:
                    items:
                        $ref: '#/components/schemas/EntityRelationship'
                    type: array
                source_data_id:
                    description: Optional source CIR record ID
                    type: string
                type:
                    description: Entity type from the ontology
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        EntityRelationship:
            properties:
                properties:
                    additionalProperties: true
                    type: object
                target_id:
                    description: Target entity ID
                    type: string
                target_type:
                    description: Target entity type
                    type: string
                type:
                    description: Relationship type from the ontology
                    type: string
            required:
                - type
                - target_id
                - target_type
            type: object
        EntityRevision:
            properties:
                attributes:
                    additionalProperties: true
                    type: object
                computed_values:
                    additionalProperties: true
                    type: object
                digital_twin_id:
                    description: Owning digital twin ID
                    type: string
                entity_id:
                    description: Entity ID
                    type: string
                id:
                    description: Entity revision ID (UUID)
                    type: string
                modifications:
                    additionalProperties: true
                    type: object
                recorded_at:
                    description: ISO-8601 timestamp when this revision was recorded
                    type: string
                relationships:
                    items:
                        $ref: '#/components/schemas/EntityRelationship'
                    type: array
                revision:
                    description: Monotonic revision number
                    type: integer
            type: object
        ExternalLLMProvider:
            properties:
                error_message:
                    description: Compilation or load error, if status=error
                    type: string
                git_commit_hash:
                    description: Commit SHA the current .so was compiled from
                    type: string
                installed_at:
                    description: ISO-8601 installation timestamp
                    type: string
                name:
                    description: Provider name derived from repository URL
                    type: string
                repository_url:
                    description: Git repository URL
                    type: string
                status:
                    description: active | error
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        ExternalLLMProviderInstallRequest:
            properties:
                git_ref:
                    description: 'Branch, tag, or commit SHA (default: main)'
                    type: string
                repository_url:
                    description: HTTPS or SSH Git URL of the LLM provider repository
                    type: string
            required:
                - repository_url
            type: object
        ExternalStoragePlugin:
            properties:
                author:
                    description: Reserved for manifest-derived authors; empty when unavailable
                    type: string
                description:
                    description: Reserved for manifest-derived descriptions; empty when unavailable
                    type: string
                error_message:
                    description: Compilation or load error, if status=error
                    type: string
                git_commit_hash:
                    description: Commit SHA the current .so was compiled from
                    type: string
                installed_at:
                    description: ISO-8601 installation timestamp
                    type: string
                name:
                    description: Plugin name derived from repository URL
                    type: string
                repository_url:
                    description: Git repository URL
                    type: string
                status:
                    description: active | error
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
                version:
                    description: Reserved for manifest-derived versions; empty when unavailable
                    type: string
            type: object
        ExternalStoragePluginInstallRequest:
            properties:
                git_ref:
                    description: 'Branch, tag, or commit SHA (default: main)'
                    type: string
                repository_url:
                    description: HTTPS or SSH Git URL of the storage plugin repository
                    type: string
            required:
                - repository_url
            type: object
        ExtractionRequest:
            properties:
                include_structured:
                    description: Whether to extract from structured data
                    type: boolean
                include_unstructured:
                    description: Whether to extract from unstructured data
                    type: boolean
                ontology_name:
                    description: Name for the generated ontology
                    type: string
                project_id:
                    description: Project ID
                    type: string
                storage_ids:
                    items:
                        type: string
                    type: array
            required:
                - project_id
                - storage_ids
                - ontology_name
            type: object
        ExtractionResult:
            properties:
                extraction_summary:
                    additionalProperties: true
                    type: object
                ontology:
                    $ref: '#/components/schemas/Ontology'
            type: object
        FactoryResetResponse:
            properties:
                message:
                    description: Human-readable summary of what the reset did and did not delete
                    type: string
                reset_at:
                    description: ISO-8601 UTC timestamp when the reset completed
                    type: string
            required:
                - reset_at
                - message
            type: object
        IngestionHealthReport:
            properties:
                generated_at:
                    description: Report generation timestamp
                    type: string
                overall_score:
                    description: Project-level ingestion health score [0,1]
                    type: number
                project_id:
                    description: Project ID
                    type: string
                recommendations:
                    items:
                        type: string
                    type: array
                sources:
                    items:
                        $ref: '#/components/schemas/IngestionHealthSource'
                    type: array
                status:
                    description: healthy | warning | critical
                    type: string
            required:
                - project_id
                - generated_at
                - overall_score
                - status
                - sources
            type: object
        IngestionHealthSource:
            properties:
                completeness_score:
                    description: Completeness score [0,1]
                    type: number
                findings:
                    items:
                        type: string
                    type: array
                freshness_score:
                    description: Freshness score [0,1]
                    type: number
                last_ingested_at:
                    description: Latest ingestion timestamp in sample
                    type: string
                overall_score:
                    description: Weighted ingestion health score [0,1]
                    type: number
                plugin_type:
                    description: Storage backend plugin type
                    type: string
                sample_size:
                    description: Number of sampled CIR records
                    type: integer
                schema_drift_score:
                    description: Schema stability score [0,1], higher is better
                    type: number
                status:
                    description: healthy | warning | critical
                    type: string
                storage_id:
                    description: Storage config ID
                    type: string
            required:
                - storage_id
                - plugin_type
                - sample_size
                - freshness_score
                - completeness_score
                - schema_drift_score
                - overall_score
                - status
            type: object
        Insight:
            properties:
                confidence:
                    description: Insight confidence [0,1]
                    type: number
                created_at:
                    description: Creation timestamp
                    type: string
                evidence:
                    additionalProperties: true
                    type: object
                explanation:
                    description: Human-readable rationale
                    type: string
                id:
                    description: Insight ID (UUID)
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                run_id:
                    description: Analysis run that produced this insight
                    type: string
                severity:
                    description: low | medium | high | critical
                    type: string
                status:
                    description: Insight lifecycle state
                    type: string
                suggested_action:
                    description: Suggested follow-up action
                    type: string
                type:
                    description: anomaly_spike | trend_break | cooccurrence_surge | other generic detector type
                    type: string
                updated_at:
                    description: Update timestamp
                    type: string
            type: object
        InsightGenerateRequest:
            properties:
                project_id:
                    description: Project ID
                    type: string
            required:
                - project_id
            type: object
        MLModel:
            properties:
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Model description
                    type: string
                id:
                    description: ML model ID (UUID)
                    type: string
                is_recommended:
                    description: True if recommended by the recommendation engine
                    type: boolean
                metadata:
                    additionalProperties: true
                    type: object
                model_artifact_path:
                    description: Orchestrator-local path to the persisted model artifact
                    type: string
                name:
                    description: Model name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                performance_metrics:
                    description: Latest performance metrics
                    type: object
                project_id:
                    description: Owning project ID
                    type: string
                recommendation_score:
                    description: Recommendation engine score
                    type: integer
                status:
                    description: draft | training | trained | failed | degraded | deprecated | archived
                    type: string
                training_config:
                    description: Training configuration
                    type: object
                training_metrics:
                    description: Metrics recorded during training
                    type: object
                training_task_id:
                    description: Canonical async work-task handle while training is in progress
                    type: string
                type:
                    description: decision_tree | random_forest | regression | neural_network
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
                version:
                    description: Model version string
                    type: string
            type: object
        MLProviderMetadata:
            properties:
                capabilities:
                    items:
                        type: string
                    type: array
                description:
                    description: Description
                    type: string
                display_name:
                    description: Human-readable provider name
                    type: string
                models:
                    items:
                        $ref: '#/components/schemas/MLProviderModel'
                    type: array
                name:
                    description: Provider name
                    type: string
                supports_inference:
                    description: Whether the provider can run inference
                    type: boolean
                supports_monitoring:
                    description: Whether the provider supports monitoring hooks
                    type: boolean
                supports_training:
                    description: Whether the provider can train models
                    type: boolean
            type: object
        MLProviderModel:
            properties:
                capabilities:
                    items:
                        type: string
                    type: array
                description:
                    description: Description
                    type: string
                display_name:
                    description: Human-readable model name
                    type: string
                name:
                    description: Provider model identifier
                    type: string
            type: object
        MetricsResponse:
            properties:
                queue:
                    properties:
                        length:
                            description: Current queue depth
                            type: integer
                    type: object
                tasks_by_status:
                    additionalProperties:
                        type: integer
                    type: object
                tasks_by_type:
                    additionalProperties:
                        type: integer
                    type: object
                timestamp:
                    description: ISO-8601 UTC snapshot timestamp
                    type: string
            type: object
        ModelCreateRequest:
            properties:
                description:
                    description: Description
                    type: string
                metadata:
                    additionalProperties: true
                    type: object
                name:
                    description: Model name
                    type: string
                ontology_id:
                    description: Linked ontology ID
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                training_config:
                    description: Training configuration
                    type: object
                type:
                    description: decision_tree | random_forest | regression | neural_network
                    type: string
            required:
                - project_id
                - ontology_id
                - name
                - type
            type: object
        ModelRecommendation:
            properties:
                all_scores:
                    additionalProperties:
                        type: integer
                    type: object
                data_analysis:
                    description: Data analysis used in the recommendation
                    type: object
                ontology_analysis:
                    description: Ontology analysis used in the recommendation
                    type: object
                reasoning:
                    description: Explanation
                    type: string
                recommended_type:
                    description: Recommended model type
                    type: string
                score:
                    description: Score (0-100)
                    type: integer
            type: object
        ModelRecommendationRequest:
            properties:
                ontology_id:
                    description: Ontology to base recommendation on
                    type: string
                project_id:
                    description: Project ID
                    type: string
            required:
                - project_id
                - ontology_id
            type: object
        ModelTrainingRequest:
            properties:
                model_id:
                    description: ID of the model to train
                    type: string
                storage_ids:
                    items:
                        type: string
                    type: array
                training_config:
                    description: Optional training configuration override
                    type: object
            required:
                - model_id
            type: object
        ModelUpdateRequest:
            properties:
                description:
                    description: New description
                    type: string
                metadata:
                    additionalProperties: true
                    type: object
                name:
                    description: New name
                    type: string
                performance_metrics:
                    description: Updated performance metrics
                    type: object
                status:
                    description: New status
                    type: string
                training_metrics:
                    description: Updated training metrics
                    type: object
            type: object
        Ontology:
            properties:
                content:
                    description: OWL/Turtle ontology content
                    type: string
                created_at:
                    description: ISO-8601 creation timestamp
                    type: string
                description:
                    description: Ontology description
                    type: string
                id:
                    description: Ontology ID (UUID)
                    type: string
                name:
                    description: Ontology name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                status:
                    description: draft | active | archived
                    type: string
                updated_at:
                    description: ISO-8601 last-updated timestamp
                    type: string
            type: object
        OntologyCreateRequest:
            properties:
                content:
                    description: Initial OWL/Turtle content
                    type: string
                description:
                    description: Description
                    type: string
                name:
                    description: Ontology name
                    type: string
                project_id:
                    description: Owning project ID
                    type: string
                status:
                    description: draft | active | archived
                    type: string
                version:
                    description: Version string
                    type: string
            required:
                - project_id
                - name
                - content
            type: object
        OntologyUpdateRequest:
            properties:
                content:
                    description: Updated OWL/Turtle content
                    type: string
                description:
                    description: New description
                    type: string
                name:
                    description: New name
                    type: string
                status:
                    description: 'New status: draft | active | archived'
                    type: string
                version:
                    description: New version string
                    type: string
            type: object
        OrderByClause:
