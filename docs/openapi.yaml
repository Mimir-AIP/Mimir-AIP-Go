info:
    contact:
        name: Mimir AIP
        url: https://github.com/Mimir-AIP/Mimir-AIP-Go
    description: REST API for the Mimir AIP orchestrator. This specification is generated automatically from inline route registrations — it stays in sync with the codebase by construction.
    license:
        name: See repository
        url: https://github.com/Mimir-AIP/Mimir-AIP-Go/blob/main/LICENSE
    title: Mimir AIP REST API
    version: 0.1.0
openapi: 3.0.3
paths:
    /api/analysis/resolver:
        post:
            description: Detects cross-source links, persists a review queue for uncertain links, and records resolver calibration metrics.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ResolverRunRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                description: Resolver run result
                                type: object
                    description: Created
                "400":
                    description: Bad request — invalid input
            summary: Run cross-source resolver analysis
            tags:
                - Analysis
    /api/analysis/resolver/metrics:
        get:
            description: Returns high-confidence precision and prior resolver run metrics over time for one project.
            parameters:
                - description: Project ID
                  in: query
                  name: project_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                description: Resolver metrics
                                type: object
                    description: 200 OK
                "400":
                    description: Bad request — invalid input
            summary: Get resolver precision metrics
            tags:
                - Analysis
    /api/connectors:
        get:
            description: Returns the generic ingestion connector catalog used by guided onboarding and self-serve setup flows.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/ConnectorTemplate'
                                type: array
                    description: 200 OK
            summary: List bundled connector templates
            tags:
                - Connectors
        post:
            description: Creates a standard pipeline and optional schedule from a bundled connector template.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ConnectorSetupRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ConnectorSetupResponse'
                    description: Created
                "400":
                    description: Bad request — invalid input
            summary: Materialize a bundled connector
            tags:
                - Connectors
    /api/digital-twins:
        get:
            description: Returns all digital twins for a project.
            parameters:
                - description: Filter by project ID
                  in: query
                  name: project_id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/DigitalTwin'
                                type: array
                    description: 200 OK
            summary: List digital twins
            tags:
                - Digital Twins
        post:
            description: Creates a persisted ontology-backed entity graph and initialises its starting entity set from the associated ontology.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/DigitalTwinCreateRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DigitalTwin'
                    description: Created
                "400":
                    description: Bad request — invalid input
            summary: Create digital twin
            tags:
                - Digital Twins
    /api/digital-twins/{id}:
        delete:
            description: ""
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "204":
                    description: No content
                "404":
                    description: Resource not found
            summary: Delete digital twin
            tags:
                - Digital Twins
        get:
            description: ""
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DigitalTwin'
                    description: 200 OK
                "404":
                    description: Resource not found
            summary: Get digital twin
            tags:
                - Digital Twins
        put:
            description: ""
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/DigitalTwinUpdateRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DigitalTwin'
                    description: 200 OK
                "400":
                    description: Bad request — invalid input
                "404":
                    description: Resource not found
            summary: Update digital twin
            tags:
                - Digital Twins
    /api/digital-twins/{id}/actions:
        get:
            description: ""
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/Action'
                                type: array
                    description: 200 OK
            summary: List actions
            tags:
                - Digital Twins
        post:
            description: Registers a conditional pipeline trigger against digital twin attributes or prediction output.
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ActionCreateRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Action'
                    description: Created
                "400":
                    description: Bad request — invalid input
            summary: Create action
            tags:
                - Digital Twins
    /api/digital-twins/{id}/actions/{actionId}:
        delete:
            description: ""
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
                - description: Action ID
                  in: path
                  name: actionId
                  required: true
                  schema:
                    type: string
            responses:
                "204":
                    description: No content
                "404":
                    description: Resource not found
            summary: Delete action
            tags:
                - Digital Twins
        get:
            description: ""
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
                - description: Action ID
                  in: path
                  name: actionId
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Action'
                    description: 200 OK
                "404":
                    description: Resource not found
            summary: Get action
            tags:
                - Digital Twins
    /api/digital-twins/{id}/alerts:
        get:
            description: Returns append-only alert events emitted during twin processing.
            parameters:
                - description: Digital twin ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
                - description: Optional maximum number of alerts to return
                  in: query
                  name: limit
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
